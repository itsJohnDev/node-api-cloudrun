name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  SERVICE: node-cloudrun-gcs-api
  REGION: us-central1
  REPO: node-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/node-repo/$SERVICE:$GITHUB_SHA .

      - name: Push Image
        run: |
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/node-repo/$SERVICE:$GITHUB_SHA

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
          --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/node-repo/$SERVICE:$GITHUB_SHA \
          --region $REGION \
          --allow-unauthenticated \
          --service-account cloudrun-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
          --set-env-vars BUCKET_NAME=${{ secrets.BUCKET_NAME }}
